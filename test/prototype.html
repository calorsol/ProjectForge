<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人项目平台 · 原型图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --blue: #2c7be5; --blue-dark: #1b64c4; --blue-light: #e8f1fd;
    --bg: #f0f2f5; --card: #fff; --border: #e6e8eb;
    --text: #1f2329; --muted: #86909c; --danger: #f53f3f;
    --warning: #ff9a2e; --success: #00b42a; --gray-tag: #eef0f3;
  }
  body { font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

  /* ---------- Top nav ---------- */
  .topbar { background: linear-gradient(90deg, #2c7be5, #1b64c4); color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 52px; }
  .topbar .brand { font-weight: 600; font-size: 16px; }
  .topbar nav { display: flex; gap: 8px; }
  .topbar nav a { color: #dbe8fb; text-decoration: none; padding: 6px 16px; border-radius: 4px; font-size: 14px; cursor: pointer; }
  .topbar nav a.active { background: rgba(255,255,255,.18); color: #fff; }
  .topbar nav a:hover { color: #fff; }
  .topbar .right { display: flex; align-items: center; gap: 18px; font-size: 13px; color: #dbe8fb; }
  .topbar .right .admin-only { display: none; }

  .container { max-width: 1160px; margin: 20px auto; padding: 0 16px; }

  /* ---------- Cards / tables ---------- */
  .card { background: var(--card); border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.05); padding: 18px 20px; }
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  input, select { height: 34px; border: 1px solid var(--border); border-radius: 4px; padding: 0 10px; font-size: 13px; outline: none; background: #fff; }
  input:focus, select:focus { border-color: var(--blue); }
  textarea { border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px; font-size: 13px; width: 100%; outline: none; resize: vertical; }
  .btn { height: 34px; padding: 0 16px; border: 1px solid var(--border); background: #fff; border-radius: 4px; cursor: pointer; font-size: 13px; color: var(--text); display: inline-flex; align-items: center; gap: 6px; }
  .btn:hover { border-color: var(--blue); color: var(--blue); }
  .btn-primary { background: var(--blue); border-color: var(--blue); color: #fff; }
  .btn-primary:hover { background: var(--blue-dark); color: #fff; }
  .spacer { flex: 1; }

  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 11px 12px; font-size: 13px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; background: #fafbfc; }
  tbody tr:hover { background: #f7f9fc; }

  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .tabs span { padding: 8px 14px; cursor: pointer; color: var(--muted); font-size: 14px; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tabs span.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 500; }

  .tag { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; }
  .tag-todo { background: var(--gray-tag); color: #4e5969; }
  .tag-doing { background: #fff3e8; color: var(--warning); }
  .tag-paused { background: #eef0f3; color: #86909c; }
  .tag-done { background: #e8f8ec; color: var(--success); }
  .tag-cancel { background: #f7f8fa; color: #c9cdd4; }
  .tag-type { background: var(--blue-light); color: var(--blue); }
  .pri-high { color: var(--danger); font-weight: 600; }
  .pri-mid { color: var(--warning); }
  .pri-low { color: var(--muted); }
  .overdue { color: var(--danger); font-weight: 600; }

  .act { color: var(--muted); cursor: pointer; margin-right: 10px; font-size: 15px; }
  .act:hover { color: var(--blue); }
  .act.done:hover { color: var(--success); }
  .act.del:hover { color: var(--danger); }

  .page { display: none; }
  .page.active { display: block; }

  /* ---------- Login ---------- */
  #login { align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #2c7be5, #1b64c4); }
  #login.active { display: flex; }
  .login-card { background: #fff; border-radius: 10px; padding: 36px 34px; width: 340px; box-shadow: 0 10px 40px rgba(0,0,0,.2); }
  .login-card h2 { text-align: center; margin-bottom: 6px; color: var(--text); }
  .login-card .sub { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .login-card .field { margin-bottom: 14px; }
  .login-card label { display: block; font-size: 13px; color: #4e5969; margin-bottom: 6px; }
  .login-card input { width: 100%; }
  .login-card .btn-primary { width: 100%; height: 38px; justify-content: center; margin-top: 8px; }
  .login-card .switch { text-align: center; margin-top: 16px; font-size: 13px; color: var(--muted); }
  .login-card .switch a { color: var(--blue); cursor: pointer; }

  /* ---------- Modal ---------- */
  .modal-mask { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 50; align-items: flex-start; justify-content: center; }
  .modal-mask.show { display: flex; }
  .modal { background: #fff; border-radius: 10px; width: 860px; max-width: 94vw; margin-top: 36px; max-height: 88vh; overflow-y: auto; }
  .modal-head { padding: 16px 22px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 15px; display: flex; justify-content: space-between; }
  .modal-head .x { cursor: pointer; color: var(--muted); }
  .modal-body { padding: 20px 22px; }
  .form-row { display: flex; align-items: center; margin-bottom: 16px; }
  .form-row > label { width: 90px; text-align: right; margin-right: 14px; font-size: 13px; color: #4e5969; }
  .form-row > label .req { color: var(--danger); margin-right: 3px; }
  .form-row .ctl { flex: 1; }
  .form-row .ctl input, .form-row .ctl select { width: 100%; }
  .form-row .ctl.two { display: flex; gap: 10px; }
  .modal-foot { padding: 14px 22px; border-top: 1px solid var(--border); text-align: right; }
  .modal-foot .btn { margin-left: 10px; }

  .stat { color: var(--blue); font-weight: 600; }
  .role-badge { background: #fef2e8; color: #f77234; padding: 1px 8px; border-radius: 4px; font-size: 12px; }
  .role-badge.user { background: var(--blue-light); color: var(--blue); }
  .hint-bar { background: #fff8e6; border: 1px solid #ffe8a3; color: #9a6a00; font-size: 12px; padding: 6px 12px; border-radius: 6px; margin-bottom: 14px; }
  .uploader { border: 1px dashed var(--border); border-radius: 6px; padding: 10px 12px; color: var(--muted); font-size: 13px; cursor: pointer; text-align: center; }
  .uploader:hover { border-color: var(--blue); color: var(--blue); }
  .img-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .img-thumb { position: relative; width: 72px; height: 72px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
  .img-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .img-thumb .rm { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,.55); color: #fff; width: 18px; height: 18px; border-radius: 50%; font-size: 12px; line-height: 18px; text-align: center; cursor: pointer; }
  .file-list { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .file-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; }
  .file-item .fn { flex: 1; color: #4e5969; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-item .fs { color: var(--muted); font-size: 12px; }
  .file-item .rm { color: var(--muted); cursor: pointer; }
  .file-item .rm:hover { color: var(--danger); }
  .editor-bar { display: flex; align-items: center; gap: 12px; border: 1px solid var(--border); border-bottom: none; border-radius: 4px 4px 0 0; padding: 7px 12px; background: #fafbfc; color: #4e5969; font-size: 14px; }
  .editor-bar span { cursor: pointer; }
  .editor-bar span:hover { color: var(--blue); }
  .editor-bar .sep { width: 1px; height: 16px; background: var(--border); cursor: default; }
</style>
</head>
<body>

<!-- ============ LOGIN PAGE ============ -->
<div id="login" class="page active">
  <div class="login-card">
    <h2 id="loginTitle">个人项目平台</h2>
    <p class="sub" id="loginSub">登录你的账号</p>
    <div class="field"><label>用户名</label><input id="lu" placeholder="请输入用户名" value="admin"></div>
    <div class="field"><label>密码</label><input type="password" placeholder="请输入密码" value="123456"></div>
    <div class="field" id="confirmField" style="display:none;"><label>确认密码</label><input type="password" placeholder="请再次输入密码"></div>
    <button class="btn-primary btn" onclick="doLogin()" id="loginBtn">登 录</button>
    <p class="switch" id="switchLine">还没有账号？<a onclick="toRegister()">注册一个</a></p>
  </div>
</div>

<!-- ============ APP SHELL ============ -->
<div id="app" class="page">
  <div class="topbar">
    <div class="brand">📋 个人项目平台</div>
    <nav>
      <a class="active" data-view="workbench" onclick="go('workbench',this)">工作台</a>
      <a data-view="projects" onclick="go('projects',this)">项目</a>
      <a data-view="members" class="admin-only" onclick="go('members',this)">成员管理</a>
    </nav>
    <div class="right">
      <span>版本 v1.0</span>
      <span id="whoami">👤 admin · 超级管理员</span>
      <span style="cursor:pointer" onclick="logout()">退出</span>
    </div>
  </div>

  <div class="container">

    <!-- ===== WORKBENCH ===== -->
    <div id="view-workbench" class="view">
      <div class="card">
        <div class="tabs">
          <span class="active" onclick="wbTab('assigned',this)">待办 (进行中/未开始)</span>
          <span onclick="wbTab('paused',this)">已暂停</span>
          <span onclick="wbTab('done',this)">已完成</span>
          <span onclick="wbTab('all',this)">全部</span>
        </div>
        <div class="toolbar">
          <input placeholder="搜索任务名称" style="width:200px">
          <select><option>全部项目</option><option>网站重构</option><option>读书计划</option></select>
          <select><option>全部类型</option><option>开发</option><option>杂务</option><option>调研</option></select>
          <div class="spacer"></div>
          <button class="btn btn-primary" onclick="openTaskModal()">＋ 新建任务</button>
        </div>
        <table>
          <thead><tr>
            <th style="width:32%">任务名称</th><th>所属项目</th><th>类型</th><th>优先级</th><th>计划开始</th><th>截止时间</th><th>状态</th><th style="width:130px">操作</th>
          </tr></thead>
          <tbody id="wbBody"></tbody>
        </table>
      </div>
    </div>

    <!-- ===== PROJECTS ===== -->
    <div id="view-projects" class="view" style="display:none">
      <div class="card">
        <div class="toolbar">
          <input placeholder="搜索项目名称" style="width:200px">
          <select><option>全部状态</option><option>进行中</option><option>已完成</option></select>
          <div class="spacer"></div>
          <button class="btn btn-primary" onclick="openProjModal()">＋ 创建项目</button>
        </div>
        <table>
          <thead><tr>
            <th>项目名称</th><th>项目编号</th><th>状态</th><th>任务总数</th><th>未完成</th><th>创建时间</th><th style="width:120px">操作</th>
          </tr></thead>
          <tbody id="projBody"></tbody>
        </table>
      </div>
    </div>

    <!-- ===== MEMBERS (admin) ===== -->
    <div id="view-members" class="view" style="display:none">
      <div class="card">
        <div class="hint-bar">⚠ 本页面仅超级管理员可见，普通用户导航栏不显示此入口。</div>
        <div class="toolbar">
          <input placeholder="搜索用户名" style="width:200px">
          <div class="spacer"></div>
        </div>
        <table>
          <thead><tr>
            <th>用户名</th><th>角色</th><th>状态</th><th>注册时间</th><th>最近登录</th><th style="width:230px">操作</th>
          </tr></thead>
          <tbody id="memBody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- ============ PROJECT MODAL ============ -->
<div class="modal-mask" id="projectModal">
  <div class="modal" style="width:720px">
    <div class="modal-head">创建项目 <span class="x" onclick="closeProjModal()">✕</span></div>
    <div class="modal-body">
      <div class="form-row"><label><span class="req">*</span>项目名称</label><div class="ctl"><input placeholder="请输入项目名称"></div></div>
      <div class="form-row"><label><span class="req">*</span>项目编号</label><div class="ctl"><input placeholder="请输入项目代号，如 web_refactor"></div></div>
      <div class="form-row"><label>排序号</label><div class="ctl"><input type="number" value="30089"></div></div>
      <div class="form-row" style="align-items:flex-start"><label style="margin-top:8px">项目描述</label><div class="ctl">
        <div class="editor-bar">
          <span title="加粗"><b>B</b></span><span title="斜体"><i>I</i></span><span title="下划线" style="text-decoration:underline">U</span>
          <span class="sep"></span>
          <span title="无序列表">☰</span><span title="有序列表">1.</span>
          <span class="sep"></span>
          <span title="插入图片">🖼</span><span title="插入链接">🔗</span><span title="表格">▦</span>
        </div>
        <textarea rows="8" placeholder="项目描述（可选），可粘贴图片" onpaste="handlePaste(event)" style="border-top-left-radius:0;border-top-right-radius:0;border-top:none"></textarea>
      </div></div>
    </div>
    <div class="modal-foot" style="text-align:center">
      <button class="btn btn-primary" onclick="closeProjModal()">保存</button>
      <button class="btn" onclick="closeProjModal()">取消</button>
    </div>
  </div>
</div>

<!-- ============ TASK MODAL ============ -->
<div class="modal-mask" id="taskModal">
  <div class="modal">
    <div class="modal-head">新建任务 <span class="x" onclick="closeTaskModal()">✕</span></div>
    <div class="modal-body">
      <div class="form-row"><label><span class="req">*</span>任务名称</label><div class="ctl"><input placeholder="请输入任务名称"></div></div>
      <div class="form-row"><label>所属项目</label><div class="ctl"><select><option>默认项目</option><option>网站重构</option><option>读书计划</option></select></div></div>
      <div class="form-row"><label>任务类型</label><div class="ctl"><select><option>开发</option><option>修复</option><option>测试</option><option>调研</option><option>杂务</option></select></div></div>
      <div class="form-row"><label>优先级</label><div class="ctl"><select><option>中</option><option>高</option><option>低</option></select></div></div>
      <div class="form-row"><label>时间计划</label><div class="ctl two"><input type="datetime-local"><input type="datetime-local"></div></div>
      <div class="form-row" style="align-items:flex-start"><label style="margin-top:8px">任务描述</label><div class="ctl"><textarea id="descBox" rows="12" placeholder="补充说明。描述可以很长；可直接 Ctrl+V 粘贴截图" onpaste="handlePaste(event)"></textarea></div></div>
      <div class="form-row" style="align-items:flex-start"><label style="margin-top:8px">图片</label><div class="ctl">
        <div class="uploader" onclick="document.getElementById('imgInput').click()">🖼 点击上传图片，或在描述框里 Ctrl+V 粘贴截图</div>
        <input type="file" id="imgInput" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files)">
        <div id="imgList" class="img-list"></div>
      </div></div>
      <div class="form-row" style="align-items:flex-start"><label style="margin-top:8px">附件</label><div class="ctl">
        <div class="uploader" onclick="document.getElementById('fileInput').click()">📎 点击上传任意文件（文档 / 压缩包 / 表格等）</div>
        <input type="file" id="fileInput" multiple style="display:none" onchange="handleAttach(this.files)">
        <div id="fileList" class="file-list"></div>
      </div></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeTaskModal()">取消</button>
      <button class="btn btn-primary" onclick="closeTaskModal()">保存</button>
    </div>
  </div>
</div>

<script>
// ---------- Mock data ----------
const today = '2026-07-14';
const tasks = [
  { name:'重构登录页样式', proj:'网站重构', type:'开发', pri:'高',  start:'07-13 09:00', due:'07-16 18:00', status:'doing' },
  { name:'整理季度报销单据', proj:'默认项目', type:'杂务', pri:'中', start:'07-14 10:00', due:'07-14 今天', overdue:false, status:'todo' },
  { name:'调研安卓端技术方案', proj:'网站重构', type:'调研', pri:'中', start:'07-12 14:00', due:'07-20 12:00', status:'paused' },
  { name:'读完《人月神话》第3章', proj:'读书计划', type:'杂务', pri:'低', start:'07-10 20:00', due:'07-11 22:00', status:'doing', overdue:true },
  { name:'部署测试环境', proj:'网站重构', type:'运维', pri:'中', start:'07-08 09:00', due:'07-10 18:00', status:'done' },
  { name:'废弃的旧需求', proj:'默认项目', type:'开发', pri:'低', start:'-', due:'-', status:'cancel' },
];
const statusMap = {
  todo:  {t:'未开始', cls:'tag-todo'},
  doing: {t:'进行中', cls:'tag-doing'},
  paused:{t:'已暂停', cls:'tag-paused'},
  done:  {t:'已完成', cls:'tag-done'},
  cancel:{t:'已取消', cls:'tag-cancel'},
};
const priMap = { '高':'pri-high', '中':'pri-mid', '低':'pri-low' };

function actionsFor(s){
  if(s==='todo')   return '<span class="act" title="开始">▶</span><span class="act done" title="完成">✓</span><span class="act" title="编辑">✎</span><span class="act del" title="删除">🗑</span>';
  if(s==='doing')  return '<span class="act" title="暂停">⏸</span><span class="act done" title="完成">✓</span><span class="act" title="编辑">✎</span><span class="act del" title="删除">🗑</span>';
  if(s==='paused') return '<span class="act" title="继续">▶</span><span class="act done" title="完成">✓</span><span class="act" title="编辑">✎</span><span class="act del" title="删除">🗑</span>';
  if(s==='done')   return '<span class="act" title="重开">↻</span><span class="act" title="查看">👁</span>';
  return '<span class="act" title="查看">👁</span>';
}

function renderWB(filter){
  let list = tasks;
  if(filter==='assigned') list = tasks.filter(t=>t.status==='todo'||t.status==='doing');
  else if(filter==='paused') list = tasks.filter(t=>t.status==='paused');
  else if(filter==='done') list = tasks.filter(t=>t.status==='done');
  const rows = list.map(t=>{
    const s = statusMap[t.status];
    const dueCls = t.overdue ? 'overdue' : '';
    return `<tr>
      <td>${t.name}</td>
      <td style="color:#4e5969">${t.proj}</td>
      <td><span class="tag tag-type">${t.type}</span></td>
      <td class="${priMap[t.pri]}">${t.pri}</td>
      <td style="color:#86909c">${t.start}</td>
      <td class="${dueCls}">${t.due}${t.overdue?' 逾期':''}</td>
      <td><span class="tag ${s.cls}">${s.t}</span></td>
      <td>${actionsFor(t.status)}</td>
    </tr>`;
  }).join('');
  document.getElementById('wbBody').innerHTML = rows || '<tr><td colspan="8" style="text-align:center;color:#86909c;padding:30px">暂无任务</td></tr>';
}

const projects = [
  {name:'网站重构', code:'web_refactor', status:'进行中', total:3, open:2, created:'2026-06-20'},
  {name:'读书计划', code:'reading_2026', status:'进行中', total:1, open:1, created:'2026-07-01'},
  {name:'默认项目', code:'default', status:'进行中', total:2, open:1, created:'2026-06-01'},
];
function renderProj(){
  document.getElementById('projBody').innerHTML = projects.map(p=>`<tr>
    <td style="color:var(--blue);font-weight:500">${p.name}</td>
    <td style="color:#86909c">${p.code}</td>
    <td><span class="tag tag-doing">${p.status}</span></td>
    <td><span class="stat">${p.total}</span></td>
    <td><span class="stat">${p.open}</span></td>
    <td style="color:#86909c">${p.created}</td>
    <td><span class="act" title="查看任务">📂</span><span class="act" title="编辑">✎</span></td>
  </tr>`).join('');
}

const members = [
  {u:'admin', role:'超级管理员', admin:true, status:'启用', reg:'2026-06-01', last:'2026-07-14 09:12'},
  {u:'zhangsan', role:'普通用户', admin:false, status:'启用', reg:'2026-06-15', last:'2026-07-13 21:03'},
  {u:'lisi', role:'普通用户', admin:false, status:'禁用', reg:'2026-07-02', last:'2026-07-05 10:40'},
];
function renderMem(){
  document.getElementById('memBody').innerHTML = members.map(m=>`<tr>
    <td>${m.u}</td>
    <td><span class="role-badge ${m.admin?'':'user'}">${m.role}</span></td>
    <td style="color:${m.status==='启用'?'#00b42a':'#f53f3f'}">${m.status}</td>
    <td style="color:#86909c">${m.reg}</td>
    <td style="color:#86909c">${m.last}</td>
    <td>
      <span class="act" title="重置密码">🔑</span>
      <span class="act" title="${m.status==='启用'?'禁用':'启用'}">${m.status==='启用'?'🚫':'✅'}</span>
      <span class="act" title="设为管理员/普通用户">⇅</span>
      <span class="act del" title="删除">🗑</span>
    </td>
  </tr>`).join('');
}

// ---------- Navigation ----------
let isRegister = false;
function toRegister(){
  isRegister = !isRegister;
  document.getElementById('confirmField').style.display = isRegister ? 'block':'none';
  document.getElementById('loginTitle').textContent = isRegister ? '注册账号':'个人项目平台';
  document.getElementById('loginSub').textContent = isRegister ? '仅需用户名和密码':'登录你的账号';
  document.getElementById('loginBtn').textContent = isRegister ? '注 册':'登 录';
  document.getElementById('switchLine').innerHTML = isRegister
    ? '已有账号？<a onclick="toRegister()">去登录</a>'
    : '还没有账号？<a onclick="toRegister()">注册一个</a>';
}
function doLogin(){
  const u = document.getElementById('lu').value.trim() || 'admin';
  const isAdmin = (u==='admin');
  document.getElementById('whoami').textContent = '👤 '+u+' · '+(isAdmin?'超级管理员':'普通用户');
  document.querySelectorAll('.admin-only').forEach(e=> e.style.display = isAdmin ? 'block':'none');
  document.getElementById('login').classList.remove('active');
  document.getElementById('app').classList.add('active');
  renderWB('assigned'); renderProj(); renderMem();
}
function logout(){
  document.getElementById('app').classList.remove('active');
  document.getElementById('login').classList.add('active');
}
function go(view, el){
  document.querySelectorAll('.topbar nav a').forEach(a=>a.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.view').forEach(v=> v.style.display='none');
  document.getElementById('view-'+view).style.display='block';
}
function wbTab(f, el){
  document.querySelectorAll('#view-workbench .tabs span').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  renderWB(f);
}
function openTaskModal(){ document.getElementById('imgList').innerHTML=''; document.getElementById('fileList').innerHTML=''; document.getElementById('taskModal').classList.add('show'); }
function closeTaskModal(){ document.getElementById('taskModal').classList.remove('show'); }
function openProjModal(){ document.getElementById('projectModal').classList.add('show'); }
function closeProjModal(){ document.getElementById('projectModal').classList.remove('show'); }

// ---- Image paste / upload (prototype: preview only; real app uploads to server) ----
function addThumb(dataUrl){
  const box = document.createElement('div');
  box.className = 'img-thumb';
  box.innerHTML = '<img src="'+dataUrl+'"><span class="rm" onclick="this.parentNode.remove()">✕</span>';
  document.getElementById('imgList').appendChild(box);
}
function handleFiles(files){
  [...files].forEach(f=>{
    if(!f.type.startsWith('image/')) return;
    const r = new FileReader();
    r.onload = e => addThumb(e.target.result);
    r.readAsDataURL(f);
  });
}
function handlePaste(ev){
  const items = (ev.clipboardData||{}).items || [];
  for(const it of items){
    if(it.type.indexOf('image')===0){
      addThumb(URL.createObjectURL(it.getAsFile()));
    }
  }
}
function fmtSize(b){
  if(b < 1024) return b + ' B';
  if(b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
function handleAttach(files){
  const list = document.getElementById('fileList');
  [...files].forEach(f=>{
    const row = document.createElement('div');
    row.className = 'file-item';
    row.innerHTML = '<span>📄</span><span class="fn">'+f.name+'</span><span class="fs">'+fmtSize(f.size)+'</span><span class="rm" onclick="this.parentNode.remove()">✕</span>';
    list.appendChild(row);
  });
}
</script>
