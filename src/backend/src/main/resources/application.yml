server:
  port: 8080
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ppm?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:db/schema.sql
app:
  jwt:
    secret: ppm-secret-key-must-be-at-least-thirty-two-characters
    expire-seconds: 86400
  upload-dir: ./uploads
mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
