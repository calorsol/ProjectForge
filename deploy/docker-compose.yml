services:
  db:
    image: mysql:8.4
    container_name: projectforge-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ppm
      MYSQL_USER: ppm
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    image: eclipse-temurin:17-jre
    container_name: projectforge-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: ppm
      DB_PASSWORD: ${MYSQL_PASSWORD}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
    volumes:
      - ./app/ppm-backend.jar:/app/ppm-backend.jar:ro
      - ./uploads:/app/uploads
    working_dir: /app
    command: ["java", "-jar", "ppm-backend.jar"]

volumes:
  mysql-data:
